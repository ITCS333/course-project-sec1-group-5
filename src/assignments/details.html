<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="details.js" defer></script>
</head>
<body class="bg-light">

<header class="bg-success text-white py-3 mb-4">
    <div class="container">
        <h1 id="assignment-title" class="h3 mb-0"></h1>
    </div>
</header>

<main class="container pb-4">

    <article class="card shadow-sm mb-4">
        <div class="card-body">
            <p id="assignment-due-date" class="text-muted mb-3"></p>

            <h2 class="h5">Description</h2>
            <p id="assignment-description" class="mb-4"></p>

            <h2 class="h5">Attached Files &amp; Links</h2>
            <ul id="assignment-files-list" class="list-group list-group-flush"></ul>
        </div>
    </article>

    <section id="discussion-forum" class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Questions &amp; Discussion</h2>

            <div id="comment-list" class="mb-4"></div>

            <form id="comment-form" action="#">
                <fieldset>
                    <legend class="fs-6 mb-3">Ask a Question</legend>

                    <label for="new-comment" class="form-label">Your Comment</label>
                    <textarea id="new-comment" class="form-control mb-3" required></textarea>

                    <button type="submit" class="btn btn-primary">Post Comment</button>
                </fieldset>
            </form>
        </div>
    </section>

</main>
</body>
</html>
