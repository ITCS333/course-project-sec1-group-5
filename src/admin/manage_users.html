<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="manage_users.js" defer></script>
</head>
<body class="bg-light">

<header class="bg-white py-4 mb-4 border-bottom">
    <div class="container">
        <h1 class="display-6 fw-semibold mb-0">Admin Portal</h1>
    </div>
</header>

<main class="container pb-5">

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h2 mb-4">Change Your Password</h2>
            <form id="password-form" action="#">
                <fieldset class="border rounded p-3">
                    <legend class="float-none w-auto px-2 fs-5">Password Update</legend>

                    <div class="mb-3">
                        <label for="current-password" class="form-label">Current Password</label>
                        <input type="password" id="current-password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="new-password" class="form-label">New Password</label>
                        <input type="password" id="new-password" class="form-control" minlength="8" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirm-password" class="form-label">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" required>
                    </div>

                    <button type="submit" id="change" class="btn btn-primary">Update Password</button>
                </fieldset>
            </form>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h2 class="h2 mb-4">Manage Users</h2>

            <details class="mb-4">
                <summary class="btn btn-outline-primary mb-3">Add New User</summary>
                <form id="add-user-form" action="#">
                    <fieldset class="border rounded p-3">
                        <legend class="float-none w-auto px-2 fs-5">New User Information</legend>

                        <div class="mb-3">
                            <label for="user-name" class="form-label">Full Name</label>
                            <input type="text" id="user-name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="user-email" class="form-label">Email</label>
                            <input type="email" id="user-email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="default-password" class="form-label">Password</label>
                            <input type="password" id="default-password" class="form-control" minlength="8" required>
                        </div>
