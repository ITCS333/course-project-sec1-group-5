<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Assignments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="admin.js" defer></script>
</head>
<body class="bg-light">

<header class="bg-white py-4 mb-4 border-bottom">
    <div class="container">
        <h1 class="display-6 fw-semibold mb-0">Manage Assignments</h1>
    </div>
</header>

<main class="container pb-5">

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h2 mb-4">Add a New Assignment</h2>
            <form id="assignment-form" action="#">
                <fieldset class="border rounded p-3">
                    <legend class="float-none w-auto px-2 fs-5">Assignment Details</legend>

                    <div class="mb-3">
                        <label for="assignment-title" class="form-label">Assignment Title</label>
                        <input id="assignment-title" type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="assignment-description" class="form-label">Description</label>
                        <textarea id="assignment-description" rows="5" class="form-control" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="assignment-due-date" class="form-label">Due Date</label>
                        <input id="assignment-due-date" type="date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="assignment-files" class="form-label">Attached File URLs (one URL per line)</label>
                        <textarea id="assignment-files" rows="3" class="form-control"></textarea>
                    </div>

                    <button id="add-assignment" type="submit" class="btn btn-primary">Add Assignment</button>
                </fieldset>
            </form>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h2 class="h2 mb-4">Current Assignments</h2>
            <div class="table-responsive">
                <table id="assignments-table" class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Title</th>
                            <th>Due Date</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="assignments-tbody"></tbody>
                </table>
            </div>
        </div>
    </section>

</main>
</body>
</html>
