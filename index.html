<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="src/common/styles.css">
</head>
<body>

    <!-- Header -->
    <header class="bg-dark text-white p-3">
        <h1 class="text-center">Course Website</h1>
    </header>

    <!-- Main Content -->
    <main class="container mt-4">

        <h2>Welcome</h2>
        <p>This is the landing page of the course website.</p>

        <!-- Boxes -->
        <div class="box-container">

            <a href="src/weekly/list.html" class="box">Weekly</a>
            <a href="src/resources/list.html" class="box">Resources</a>
            <a href="src/discussion/index.html" class="box">Discussion</a>
            <a href="src/assignments/list.html" class="box">Assignments</a>

        </div>

        <!-- Login Section - موجود ومحفوظ -->
        <div class="login-section mt-5 p-4 border rounded bg-light">
            <h3>Login</h3>
            <form>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>

    </main>

</body>
</html>
