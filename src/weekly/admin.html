<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weekly Breakdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="admin.js" defer></script>
</head>
<body class="bg-light">

<header class="py-4 mb-4 border-bottom bg-white">
    <div class="container">
        <h1 class="display-6 fw-semibold mb-0">Manage Weekly Breakdown</h1>
    </div>
</header>

<main class="container pb-5">
    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h2 mb-4">Add a New Week</h2>

            <form id="week-form" action="#">
                <fieldset class="border rounded p-3">
                    <legend class="float-none w-auto px-2 fs-5">Weekly Details</legend>

                    <div class="mb-3">
                        <label for="week-title" class="form-label">Week Title</label>
                        <input
                            id="week-title"
                            type="text"
                            class="form-control"
                            placeholder="Week 1: Introduction to HTML"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="week-start-date" class="form-label">Start Date</label>
                        <input
                            id="week-start-date"
                            type="date"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="week-description" class="form-label">Description</label>
                        <textarea
                            id="week-description"
                            rows="5"
                            class="form-control"
                        ></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="week-links" class="form-label">Resource Links (one URL per line)</label>
                        <textarea
                            id="week-links"
                            rows="3"
                            class="form-control"
                        ></textarea>
                    </div>

                    <button id="add-week" type="submit" class="btn btn-primary">Add Week</button>
                </fieldset>
            </form>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h2 class="h2 mb-4">Current Weekly Breakdown</h2>

            <div class="table-responsive">
                <table id="weeks-table" class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Week Title</th>
                            <th>Start Date</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="weeks-tbody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

</body>
</html>
